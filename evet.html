<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa 1</title>
</head>
<body>
    <h1>Sayfa 1'e Hoşgeldiniz!</h1>
    <p>Bu sayfada yapılan giriş sayısını F12'ye basarak görebilirsiniz.</p>

    <script>
        // Sayfa yüklendiğinde localStorage'dan ziyaret sayısını al
        let visitCount1 = localStorage.getItem("visitCount1");

        // Eğer daha önce bir giriş yapılmamışsa, sayacı başlat
        if (visitCount1 === null) {
            visitCount1 = 0;
        }

        // Giriş sayısını bir arttır
        visitCount1++;

        // Yeni sayıyı localStorage'a kaydet
        localStorage.setItem("visitCount1", visitCount1);

        // Sayfada ziyaret sayısını konsola yazdır
        console.log("Sayfa 1'de giriş sayınız: " + visitCount1);

        // Konsola bir komut girildiğinde sayacı sıfırlayacak işlev
        console.clear = function() {
            // Sayacı sıfırla ve localStorage'a sıfırlamayı kaydet
            localStorage.setItem("visitCount1", 0);
            console.log("Sayfa 1'de ziyaret sayacı sıfırlandı.");
        };

        // localStorage değişikliklerini dinle
        window.addEventListener("storage", function(event) {
            if (event.key === "visitCount1") {
                console.log("Sayfa 1'de ziyaret sayacı güncellendi: " + event.newValue);
            }
        });
    </script>
</body>
</html>

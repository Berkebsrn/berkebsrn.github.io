<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa 2</title>
</head>
<body>
    <h1>Sayfa 2'ye Hoşgeldiniz!</h1>
    <p>Bu sayfada yapılan giriş sayısını F12'ye basarak görebilirsiniz.</p>

    <script>
        // Sayfa yüklendiğinde localStorage'dan ziyaret sayısını al
        let visitCount2 = localStorage.getItem("visitCount2");

        // Eğer daha önce bir giriş yapılmamışsa, sayacı başlat
        if (visitCount2 === null) {
            visitCount2 = 0;
        }

        // Giriş sayısını bir arttır
        visitCount2++;

        // Yeni sayıyı localStorage'a kaydet
        localStorage.setItem("visitCount2", visitCount2);

        // Sayfada ziyaret sayısını konsola yazdır
        console.log("Sayfa 2'de giriş sayınız: " + visitCount2);

        // Konsola bir komut girildiğinde sayacı sıfırlayacak işlev
        console.clear = function() {
            // Sayacı sıfırla ve localStorage'a sıfırlamayı kaydet
            localStorage.setItem("visitCount2", 0);
            console.log("Sayfa 2'de ziyaret sayacı sıfırlandı.");
        };

        // localStorage değişikliklerini dinle
        window.addEventListener("storage", function(event) {
            if (event.key === "visitCount2") {
                console.log("Sayfa 2'de ziyaret sayacı güncellendi: " + event.newValue);
            }
        });
    </script>
</body>
</html>
